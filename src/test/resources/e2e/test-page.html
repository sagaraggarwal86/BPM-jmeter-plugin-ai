<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM E2E Test Page</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .hero { width: 100%; height: 300px; background: #2196F3; color: white;
                display: flex; align-items: center; justify-content: center;
                font-size: 48px; }
        .content { padding: 20px; }
        .shift-box { width: 200px; height: 100px; background: #FF9800; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="hero" id="largest-element">BPM Test Page</div>
    <div class="content">
        <h1>E2E Test Content</h1>
        <p>This page is designed for BPM end-to-end testing.</p>
        <div class="shift-box" id="shift-target">Shift Target</div>
    </div>

    <script>
        // Deliberate console error for ConsoleCollector testing
        console.error("BPM-TEST-ERROR: Deliberate test error for E2E validation");

        // Deliberate console warning
        console.warn("BPM-TEST-WARN: Deliberate test warning for E2E validation");

        // Deliberate layout shift after 100ms for CLS testing
        setTimeout(function() {
            var box = document.getElementById('shift-target');
            if (box) {
                box.style.marginTop = '50px';
                box.style.width = '400px';
            }
        }, 100);

        // Load a small external resource for network timing
        var img = new Image();
        img.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';
    </script>
</body>
</html>
