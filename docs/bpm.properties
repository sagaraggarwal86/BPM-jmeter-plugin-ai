# ============================================
# Browser Performance Metrics (BPM) v1.0
# Auto-generated by Browser Performance Metrics plugin
# ============================================
# --- Metric Collection ---
# Enable/disable metric categories (default: true)
metrics.webvitals=true
metrics.network=true
metrics.runtime=true
metrics.console=true
# Number of slowest resources to capture (default: 5)
network.topN=5
# --- SLA Thresholds ---
# FCP (ms)
sla.fcp.good=1800
sla.fcp.poor=3000
# LCP (ms)
sla.lcp.good=2500
sla.lcp.poor=4000
# CLS (unitless)
sla.cls.good=0.1
sla.cls.poor=0.25
# TTFB (ms)
sla.ttfb.good=800
sla.ttfb.poor=1800
# JS Errors (count)
sla.jserrors.good=0
sla.jserrors.poor=5
# Performance Score thresholds
sla.score.good=90
sla.score.poor=50
# --- Bottleneck Indicator Thresholds ---
# Server bottleneck: TTFB > X% of LCP (default: 60)
bottleneck.server.ratio=60
# Resource bottleneck: slowest resource > X% of LCP (default: 40)
bottleneck.resource.ratio=40
# Client rendering bottleneck: render time > X% of LCP (default: 60)
bottleneck.client.ratio=60
# Layout thrashing: layoutCount > domNodes * X (default: 0.5)
bottleneck.layoutThrash.factor=0.5
# --- Security ---
# Sanitize sensitive data in console messages (default: true)
security.sanitize=true
# --- Output ---
# Default JSONL output path (relative to JMeter working directory)
# Override per-run via: -Jbpm.output=custom-output.jsonl
bpm.output=bpm-results.jsonl
# --- Debug ---
# Enable detailed BPM operational logging (default: false)
bpm.debug=false